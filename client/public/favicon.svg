<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Vice to Value">
  <title>Vice to Value</title>
  <defs>
    <clipPath id="fav-l"><polygon points="6,6 20,6 32,60 18,60"/></clipPath>
    <clipPath id="fav-r"><polygon points="32,60 46,60 58,6 44,6"/></clipPath>
  </defs>

  <!-- Left arm — dark charcoal -->
  <polygon points="6,6 20,6 32,60 18,60" fill="#2C2C2A" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
  <g clip-path="url(#fav-l)" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="1.5" stroke-linecap="round">
    <line x1="21" y1="10" x2="8"  y2="30"/>
    <line x1="24" y1="26" x2="11" y2="48"/>
    <line x1="27" y1="43" x2="15" y2="62"/>
  </g>

  <!-- Right arm — teal -->
  <polygon points="32,60 46,60 58,6 44,6" fill="#0F6E56"/>
  <g clip-path="url(#fav-r)" fill="rgba(255,255,255,0.26)">
    <rect x="34" y="48" width="3" height="12"/>
    <rect x="38" y="40" width="3" height="20"/>
    <rect x="42" y="28" width="3" height="32"/>
    <rect x="46" y="14" width="3" height="46"/>
  </g>
</svg>
