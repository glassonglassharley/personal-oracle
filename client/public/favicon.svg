<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Vice to Value">
  <title>Vice to Value</title>
  <defs>
    <!-- Dark forest-green background, lighter in center like the PNG logo -->
    <radialGradient id="fav-bg" cx="50%" cy="42%" r="58%">
      <stop offset="0%"   stop-color="#1E6642"/>
      <stop offset="100%" stop-color="#071610"/>
    </radialGradient>

    <!-- Gold gradient for left arm (top-left → bottom-center) -->
    <linearGradient id="fav-gL" x1="13" y1="8" x2="30" y2="55" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#F2CD5A"/>
      <stop offset="40%"  stop-color="#C99B18"/>
      <stop offset="100%" stop-color="#7B5A0A"/>
    </linearGradient>

    <!-- Gold gradient for right arm (top-right → bottom-center, mirrored) -->
    <linearGradient id="fav-gR" x1="51" y1="8" x2="34" y2="55" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#F2CD5A"/>
      <stop offset="40%"  stop-color="#C99B18"/>
      <stop offset="100%" stop-color="#7B5A0A"/>
    </linearGradient>
  </defs>

  <!-- Background with rounded corners matching app-icon style -->
  <rect width="64" height="64" rx="13" fill="url(#fav-bg)"/>
  <!-- Subtle gold border ring -->
  <rect width="64" height="64" rx="13" fill="none" stroke="rgba(212,175,55,0.45)" stroke-width="1.2"/>

  <!-- V — Left arm: top-left → bottom-center -->
  <polygon points="7,8 20,8 32,55 27,55" fill="url(#fav-gL)"/>
  <!-- Inner bevel highlight (the bright inner face that gives 3-D depth) -->
  <polygon points="17,8 20,8 32,55 29,55" fill="rgba(255,245,150,0.55)"/>

  <!-- V — Right arm: top-right → bottom-center (mirror) -->
  <polygon points="57,8 44,8 32,55 37,55" fill="url(#fav-gR)"/>
  <!-- Inner bevel highlight -->
  <polygon points="47,8 44,8 32,55 35,55" fill="rgba(255,245,150,0.55)"/>
</svg>
