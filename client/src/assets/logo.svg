<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 72" fill="none" role="img" aria-label="Vice to Value">
  <title>Vice to Value</title>
  <defs>
    <clipPath id="vtv-l"><polygon points="6,10 20,10 32,64 18,64"/></clipPath>
    <clipPath id="vtv-r"><polygon points="32,64 46,64 58,10 44,10"/></clipPath>
  </defs>

  <!-- Left arm — dark charcoal, falling motion lines -->
  <polygon points="6,10 20,10 32,64 18,64" fill="#2C2C2A" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
  <g clip-path="url(#vtv-l)" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="1.5" stroke-linecap="round">
    <line x1="22" y1="14" x2="9"  y2="34"/>
    <line x1="25" y1="30" x2="13" y2="53"/>
    <line x1="28" y1="48" x2="17" y2="66"/>
  </g>

  <!-- Right arm — teal, rising bar chart -->
  <polygon points="32,64 46,64 58,10 44,10" fill="#0F6E56"/>
  <g clip-path="url(#vtv-r)" fill="rgba(255,255,255,0.26)">
    <rect x="34" y="52" width="3" height="12"/>
    <rect x="38" y="44" width="3" height="20"/>
    <rect x="42" y="32" width="3" height="32"/>
    <rect x="46" y="18" width="3" height="46"/>
  </g>

  <!-- Divider -->
  <line x1="68" y1="18" x2="68" y2="54" stroke="currentColor" stroke-width="0.5" opacity="0.18"/>

  <!-- Wordmark -->
  <text x="76" y="37"
    font-family="Geist, 'Helvetica Neue', Arial, sans-serif"
    font-size="14" font-weight="600" letter-spacing="3"
    fill="currentColor">VICE TO VALUE</text>
  <text x="76" y="51"
    font-family="Geist, 'Helvetica Neue', Arial, sans-serif"
    font-size="7.5" font-weight="400" letter-spacing="1.8"
    fill="currentColor" opacity="0.5">CUT TODAY. GROW TOMORROW.</text>
</svg>
